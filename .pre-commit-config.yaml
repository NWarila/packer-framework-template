repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 13a6bda8ea7612b3aec844ded16569d424b9a1ab # v0.13.0
    hooks:
      - id: ruff-check
        name: ruff
        args: [tools/]
        pass_filenames: false
        files: ^tools/.*\.py$

  - repo: https://github.com/adrienverge/yamllint
    rev: 81e9f98ffd059efe8aa9c1b1a42e5cce61b640c6 # v1.35.1
    hooks:
      - id: yamllint
        args:
          - -d
          - "{ extends: relaxed, rules: { line-length: disable, document-start: disable, comments: disable, truthy: {check-keys: false} } }"
          - .github/workflows/
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: 99470f5e12208ff0fb17ab81c3c494f7620a1d8d # v0.11.0
    hooks:
      - id: shellcheck
        files: ^tools/ci/.*\.sh$

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 996abf60411a8d954288ac9856aae7602b80cbda # v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: ["**/*.md"]
        pass_filenames: false
        files: \.md$

  - repo: local
    hooks:
      - id: packer-fmt
        name: packer fmt
        entry: packer fmt -recursive packer examples
        language: system
        pass_filenames: false
        files: ^(packer|examples)/.*\.(pkr|pkrvars|pkrtpl)\.hcl$

      - id: packer-docs
        name: packer docs
        entry: python tools/gen_packer_docs.py
        language: system
        pass_filenames: false
        files: ^packer/variables\.pkr\.hcl$|^docs/reference/packer\.md$|^tools/gen_packer_docs\.py$

      - id: packer-plugin-provenance
        name: packer plugin provenance
        entry: python tools/check_packer_plugin_provenance.py
        language: system
        pass_filenames: false
        files: ^packer/packer\.pkr\.hcl$|^packer/plugin-provenance\.json$|^tools/check_packer_plugin_provenance\.py$

      - id: docs-layout
        name: docs layout
        entry: python tools/check_docs_layout.py
        language: system
        pass_filenames: false
        files: ^docs/.*\.md$|^tools/check_docs_layout.py$

      - id: adr-schema
        name: ADR schema and index
        entry: python tools/check_adr_schema.py
        language: system
        pass_filenames: false
        files: ^docs/decision-records/.*\.md$|^tools/check_adr_schema.py$
