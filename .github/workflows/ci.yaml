name: CI

# Self-validation for packer-framework-template. Exercises the reference
# framework end-to-end without credentials, while keeping the same repo-quality
# surface derivative Packer frameworks should inherit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  workflow-helper-tests:
    name: workflow helper tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install Bats and ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bats shellcheck
      - name: ShellCheck workflow helpers
        run: shellcheck tools/ci/*.sh
      - name: Check workflow run-block input binding
        run: python tools/ci/check_workflow_run_inputs.py .github/workflows
      - name: Bats workflow helper tests
        run: bats tests/ci/*.bats

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: "**/*.md"

  packer-ci:
    name: packer verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Packer
        # renovate: datasource=github-releases depName=hashicorp/packer extractVersion=^v(?<version>.*)$
        env:
          PACKER_VERSION: "1.15.0"
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/packer.zip \
            "https://releases.hashicorp.com/packer/${PACKER_VERSION}/packer_${PACKER_VERSION}_linux_amd64.zip"
          unzip -q /tmp/packer.zip -d /tmp/packer
          install -m 0755 /tmp/packer/packer /usr/local/bin/packer
          packer version

      - name: Install OPA
        # renovate: datasource=github-releases depName=open-policy-agent/opa
        env:
          OPA_VERSION: "1.10.0"
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/opa \
            "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static"
          chmod +x /usr/local/bin/opa
          opa version

      - name: Install Bats and ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bats shellcheck

      - name: Verify
        run: python tools/verify.py verify

  windows-path-checks:
    name: packer verify / windows path checks
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Packer
        shell: pwsh
        env:
          # renovate: datasource=github-releases depName=hashicorp/packer extractVersion=^v(?<version>.*)$
          PACKER_VERSION: "1.15.0"
        run: |
          $ErrorActionPreference = "Stop"
          $zip = Join-Path $env:RUNNER_TEMP "packer.zip"
          $checksums = Join-Path $env:RUNNER_TEMP "packer_SHA256SUMS"
          $dest = Join-Path $env:RUNNER_TEMP "packer"
          $fileName = "packer_$($env:PACKER_VERSION)_windows_amd64.zip"
          Invoke-WebRequest `
            -Uri "https://releases.hashicorp.com/packer/$env:PACKER_VERSION/$fileName" `
            -OutFile $zip
          Invoke-WebRequest `
            -Uri "https://releases.hashicorp.com/packer/$env:PACKER_VERSION/packer_$($env:PACKER_VERSION)_SHA256SUMS" `
            -OutFile $checksums
          $line = Get-Content $checksums | Where-Object {
            $_ -match "\s+$([regex]::Escape($fileName))$"
          } | Select-Object -First 1
          if (-not $line) {
            throw "Checksum entry for $fileName was not found"
          }
          $expected = (($line -split "\s+")[0]).ToLowerInvariant()
          $actual = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "SHA256 mismatch for $fileName. Expected $expected, got $actual"
          }
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          Add-Content -Path $env:GITHUB_PATH -Value $dest
          & (Join-Path $dest "packer.exe") version

      - name: Verify path-sensitive cases
        shell: pwsh
        run: |
          python tools/verify.py init
          python tools/verify.py plugin-install-check
          python tools/verify.py validate --case reference-windows
          python tools/verify.py test
